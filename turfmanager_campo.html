<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#185FA5">
<title>TurfManager Campo</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#fff;--bg2:#f1efe8;--bg3:#e8e6df;--tx:#1a1a18;--tx2:#5f5e5a;--tx3:#9a9890;--bo:rgba(0,0,0,.11);--bo2:rgba(0,0,0,.20);--blue:#185FA5;--blue2:#0C447C;--green:#3B6D11;--green2:#27500A;--red:#A32D2D;--br:10px;--brl:14px}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg3);min-height:100vh;color:var(--tx);font-size:15px;padding-bottom:env(safe-area-inset-bottom)}

/* ── LOGIN ── */
#login-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;gap:16px}
.login-logo{font-size:22px;font-weight:700;color:var(--blue);display:flex;align-items:center;gap:8px;margin-bottom:8px}
.login-sub{font-size:13px;color:var(--tx2);text-align:center;margin-bottom:8px}
.login-card{background:var(--bg);border-radius:var(--brl);border:0.5px solid var(--bo);padding:24px;width:100%;max-width:360px;display:flex;flex-direction:column;gap:12px}
.login-card h2{font-size:15px;font-weight:600;color:var(--tx);margin-bottom:4px}
.fun-btn{width:100%;padding:14px 16px;border-radius:var(--br);border:0.5px solid var(--bo);background:var(--bg2);text-align:left;font-size:15px;font-weight:500;color:var(--tx);cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:12px;transition:background .15s}
.fun-btn:active{background:var(--bg3)}
.fun-btn .avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0;color:#fff}

/* ── APP SHELL ── */
#app-screen{display:none;flex-direction:column;min-height:100vh}
.topbar{background:var(--blue);padding:12px 16px;display:flex;align-items:center;gap:10px;padding-top:calc(12px + env(safe-area-inset-top))}
.topbar-logo{font-size:13px;font-weight:600;color:rgba(255,255,255,.7);flex:1}
.topbar-name{font-size:15px;font-weight:700;color:#fff}
.topbar-back{background:none;border:none;color:rgba(255,255,255,.8);font-size:22px;cursor:pointer;padding:0;display:flex;align-items:center}

/* ── VISTA SELECTOR ── */
.view-bar{background:var(--bg);border-bottom:0.5px solid var(--bo);padding:10px 16px;display:flex;gap:6px;align-items:center}
.view-btn{flex:1;padding:9px 0;border-radius:var(--br);border:0.5px solid var(--bo2);background:none;font-size:13px;font-weight:500;cursor:pointer;color:var(--tx2);font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px}
.view-btn.on{background:var(--blue);color:#fff;border-color:var(--blue)}

/* ── WEEK NAV ── */
.week-nav{background:var(--bg);border-bottom:0.5px solid var(--bo);padding:8px 16px;display:flex;align-items:center;gap:6px}
.week-nav-btn{background:none;border:0.5px solid var(--bo2);border-radius:var(--br);width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--tx);font-size:18px;flex-shrink:0}
.week-nav-btn:active{background:var(--bg2)}
.week-label{flex:1;text-align:center;font-size:13px;font-weight:500;color:var(--tx)}
.week-today{background:none;border:0.5px solid var(--blue);border-radius:var(--br);padding:4px 12px;font-size:12px;color:var(--blue);cursor:pointer;font-family:inherit}

/* ── WEEK VIEW ── */
.week-strip{background:var(--bg);border-bottom:0.5px solid var(--bo);display:grid;grid-template-columns:repeat(7,1fr)}
.week-day{padding:8px 4px;text-align:center;cursor:pointer;border-right:0.5px solid var(--bo)}
.week-day:last-child{border-right:none}
.week-day.active{background:var(--blue)}
.week-day.today .wd-num{color:var(--blue);font-weight:700}
.week-day.active .wd-name,.week-day.active .wd-num{color:#fff}
.week-day.active .wd-dot{background:rgba(255,255,255,.6)}
.wd-name{font-size:9px;text-transform:uppercase;color:var(--tx3);letter-spacing:.4px}
.week-day.active .wd-name{color:rgba(255,255,255,.8)}
.wd-num{font-size:17px;font-weight:500;color:var(--tx);line-height:1.2}
.wd-dot{width:5px;height:5px;border-radius:50%;background:var(--blue);margin:3px auto 0;display:none}
.wd-dot.vis{display:block}

/* ── CONTENT ── */
.content{flex:1;padding:14px 16px;overflow-y:auto}

/* ── TASK CARD ── */
.tcard{background:var(--bg);border:0.5px solid var(--bo);border-radius:var(--brl);margin-bottom:12px;overflow:hidden}
.chip-drag{-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;touch-action:none;cursor:grab;}
.thead{padding:14px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;user-select:none}
.thead:active{background:var(--bg2)}
.tbar{width:5px;border-radius:3px;flex-shrink:0;align-self:stretch;min-height:44px}
.tinfo{flex:1}
.ttask{font-size:15px;font-weight:600}
.tsub{font-size:12px;color:var(--tx2);margin-top:3px}
.ttime{font-size:14px;font-weight:600;text-align:right;flex-shrink:0}
.tst{font-size:11px;margin-top:3px;text-align:right}
.tbody{border-top:0.5px solid var(--bo);padding:16px}
.tbody.h{display:none}

/* STATUS BADGES */
.eb{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:6px;font-size:11px;font-weight:500}
.eb-p{background:#FAC775;color:#633806}
.eb-e{background:#B5D4F4;color:#0C447C}
.eb-c{background:#C0DD97;color:#27500A}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.eb-e{animation:pulse 1.6s ease-in-out infinite}

/* SPEC BOX */
.spec-box{background:var(--bg2);border-radius:var(--br);padding:10px 13px;margin-bottom:14px;font-size:13px;border-left:3px solid var(--blue)}
.spec-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--tx2);margin-bottom:3px;font-weight:600}

/* CHECKLIST */
.cl-title{font-size:11px;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.prog-bar{width:100%;height:5px;background:var(--bg2);border-radius:3px;margin-bottom:12px;overflow:hidden}
.prog-fill{height:100%;background:var(--blue);border-radius:3px;transition:width .25s}
.cl-wrap{margin-bottom:16px}
.cl-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:0.5px solid var(--bo);cursor:pointer}
.cl-item:last-child{border-bottom:none}
.cl-item input[type=checkbox]{width:20px;height:20px;cursor:pointer;accent-color:var(--blue);flex-shrink:0}
.cl-item label{font-size:14px;color:var(--tx);cursor:pointer;flex:1}
.cl-item.done label{text-decoration:line-through;color:var(--tx3)}

/* MAQUINA HS */
.maq-box{background:#E8F1FB;border:0.5px solid #b5d4f4;border-radius:var(--br);padding:11px 14px;margin-bottom:14px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.maq-box label{font-size:12px;color:var(--blue2);font-weight:600;flex:1}
.maq-box input{width:90px;padding:7px 10px;font-size:15px;border:0.5px solid #b5d4f4;border-radius:var(--br);background:#fff;color:var(--tx);font-family:inherit;text-align:center}

/* OBS */
.obs-wrap{margin-bottom:14px}
.obs-lbl{display:block;font-size:12px;color:var(--tx2);margin-bottom:5px;font-weight:600}
.obs-wrap textarea{width:100%;padding:10px 12px;font-size:14px;border:0.5px solid var(--bo2);border-radius:var(--br);background:var(--bg2);color:var(--tx);font-family:inherit;resize:none;min-height:70px}

/* BUTTONS */
.btn-iniciar{width:100%;padding:14px;border-radius:var(--br);border:none;background:var(--blue);color:#fff;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:4px}
.btn-iniciar:active{background:var(--blue2)}
.btn-completar{width:100%;padding:14px;border-radius:var(--br);border:none;background:var(--green);color:#fff;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:4px}
.btn-completar:active{background:var(--green2)}
.drop-cell{cursor:default;}
.msel-wrap{position:relative;display:inline-block}
.msel-btn{font-size:12px;padding:4px 10px;border:0.5px solid var(--bo2);border-radius:var(--br);background:var(--bg2);color:var(--tx);cursor:pointer;font-family:inherit;white-space:nowrap}
.msel-btn.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.msel-drop{display:none;position:absolute;top:calc(100% + 4px);left:0;background:var(--bg);border:0.5px solid var(--bo2);border-radius:var(--br);min-width:170px;z-index:50;box-shadow:0 4px 16px rgba(0,0,0,.12);padding:4px 0;max-height:240px;overflow-y:auto}
.msel-drop.open{display:block}
.msel-item{display:flex;align-items:center;gap:8px;padding:6px 12px;font-size:13px;cursor:pointer;white-space:nowrap}
.msel-item:hover{background:var(--bg2)}
.msel-item input{accent-color:var(--blue);cursor:pointer;flex-shrink:0;width:16px;height:16px}
.done-row{display:flex;align-items:center;gap:10px;padding:10px 0;color:var(--tx2);font-size:13px}
.done-row i{color:var(--green);font-size:20px}

/* EMPTY */
.empty{text-align:center;padding:48px 24px;color:var(--tx3);font-size:14px;display:flex;flex-direction:column;align-items:center;gap:10px}
.empty i{font-size:36px;opacity:.4}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-logo">🌿 TurfManager</div>
  <div class="login-sub">Seleccioná tu nombre para continuar</div>
  <div class="login-card">
    <h2>Ingresá tu usuario</h2>
    <input type="text" id="login-input" placeholder="usuario" autocomplete="username" autocapitalize="none"
      style="width:100%;padding:13px 14px;font-size:16px;border:0.5px solid var(--bo2);border-radius:var(--br);background:var(--bg2);color:var(--tx);font-family:inherit;margin-bottom:8px"
      onkeydown="if(event.key==='Enter')document.getElementById('login-pass').focus()">
    <input type="password" id="login-pass" placeholder="contraseña" autocomplete="current-password"
      style="width:100%;padding:13px 14px;font-size:16px;border:0.5px solid var(--bo2);border-radius:var(--br);background:var(--bg2);color:var(--tx);font-family:inherit;margin-bottom:8px"
      onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()" style="width:100%;padding:14px;border-radius:var(--br);border:none;background:var(--blue);color:#fff;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit">Entrar</button>
    <div id="no-funs" style="display:none;font-size:13px;color:var(--red);text-align:center;padding:10px 0;margin-top:4px"></div>
  </div>
</div>

<!-- APP -->
<div id="app-screen">
  <div class="topbar">
    <button class="topbar-back" onclick="logout()" title="Salir">‹</button>
    <div style="flex:1">
      <div class="topbar-logo">TurfManager Campo</div>
      <div class="topbar-name" id="topbar-name"></div>
    </div>
    
    <button onclick="forceRefresh()" style="background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:50%;width:32px;height:32px;font-size:16px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center" title="Actualizar">↻</button>
    <div id="topbar-pend" style="font-size:11px;color:rgba(255,255,255,.8)"></div>
  </div>

  <div id="admin-bar" style="display:none;background:#E8F1FB;border-bottom:0.5px solid var(--bo);padding:8px 16px;flex-wrap:wrap;gap:6px;align-items:center">
  <span style="font-size:11px;font-weight:600;color:var(--blue2)">Filtros admin</span>
  <div class="msel-wrap" id="af-msel-fun">
    <button class="msel-btn" onclick="toggleMSelC('af-msel-fun')"><span id="af-fun-lbl">Todos los funcionarios</span> ▾</button>
    <div class="msel-drop" id="af-fun-drop"></div>
  </div>
  <div class="msel-wrap" id="af-msel-cli">
    <button class="msel-btn" onclick="toggleMSelC('af-msel-cli')"><span id="af-cli-lbl">Todos los clientes</span> ▾</button>
    <div class="msel-drop" id="af-cli-drop"></div>
  </div>
  <div class="msel-wrap" id="af-msel-est">
    <button class="msel-btn" onclick="toggleMSelC('af-msel-est')"><span id="af-est-lbl">Todos los estados</span> ▾</button>
    <div class="msel-drop" id="af-est-drop">
      <label class="msel-item"><input type="checkbox" value="pendiente" onchange="applyMSelC()"> Pendiente</label>
      <label class="msel-item"><input type="checkbox" value="en_curso" onchange="applyMSelC()"> En curso</label>
      <label class="msel-item"><input type="checkbox" value="completada" onchange="applyMSelC()"> Completada</label>
    </div>
  </div>
  <button onclick="clearMSelC()" style="font-size:11px;padding:4px 8px;border-radius:var(--br);border:0.5px solid var(--bo2);background:none;cursor:pointer;font-family:inherit">✕ Limpiar</button>
  <div style="display:flex;align-items:center;gap:6px">
    <span style="font-size:11px;color:var(--blue2);font-weight:600">Cancha:</span>
    <select id="af-can" onchange="render()" style="font-size:12px;padding:4px 8px;border:0.5px solid var(--bo2);border-radius:var(--br);background:var(--bg);color:var(--tx);font-family:inherit">
      <option value="">Todas</option>
    </select>
  </div>
  <div style="display:flex;align-items:center;gap:6px">
    <span style="font-size:11px;color:var(--blue2);font-weight:600">Tipo:</span>
    <select id="af-tipo" onchange="render()" style="font-size:12px;padding:4px 8px;border:0.5px solid var(--bo2);border-radius:var(--br);background:var(--bg);color:var(--tx);font-family:inherit">
      <option value="">Todos</option>
      <option value="canchas">🌿 Mant. Canchas</option>
      <option value="maquinaria">⚙️ Mant. Maquinaria</option>
      <option value="actividad">⚽ Actividad deportiva</option>
    </select>
  </div>
</div>
<div class="view-bar">
    <button class="view-btn on" id="btn-dia" onclick="setView('dia')">📅 Día</button>
    <button class="view-btn" id="btn-semana" onclick="setView('semana')">🗓 Semana</button>
    <button class="view-btn" id="btn-reporte" style="display:none" onclick="setView('reporte')">📊 Resumen</button>
    <button class="view-btn" id="btn-libro" style="display:none" onclick="setView('libro')">📓 Libro</button>
  </div>

  <!-- FUNCIONARIO FILTER BAR -->
  <div id="fun-filter-bar" style="display:none;background:var(--bg2);border-bottom:0.5px solid var(--bo);padding:8px 16px;flex-wrap:wrap;gap:8px;align-items:center">
    <span style="font-size:11px;font-weight:600;color:var(--tx2)">Filtrar:</span>
    <div id="ffb-cli-wrap" style="display:none;align-items:center;gap:6px">
      <span style="font-size:11px;color:var(--tx2)">Cliente:</span>
      <select id="ffb-cli" onchange="onFunFilterCli()" style="font-size:12px;padding:4px 8px;border:0.5px solid var(--bo2);border-radius:var(--br);background:var(--bg);color:var(--tx);font-family:inherit">
        <option value="">Todos</option>
      </select>
    </div>
    <div style="display:flex;align-items:center;gap:6px">
      <span style="font-size:11px;color:var(--tx2)">Cancha:</span>
      <select id="ffb-can" onchange="render()" style="font-size:12px;padding:4px 8px;border:0.5px solid var(--bo2);border-radius:var(--br);background:var(--bg);color:var(--tx);font-family:inherit">
        <option value="">Todas</option>
      </select>
    </div>
    <div style="display:flex;align-items:center;gap:6px">
      <span style="font-size:11px;color:var(--tx2)">Tipo:</span>
      <select id="ffb-tipo" onchange="render()" style="font-size:12px;padding:4px 8px;border:0.5px solid var(--bo2);border-radius:var(--br);background:var(--bg);color:var(--tx);font-family:inherit">
        <option value="">Todos</option>
        <option value="canchas">🌿 Mant. Canchas</option>
        <option value="maquinaria">⚙️ Mant. Maquinaria</option>
        <option value="actividad">⚽ Actividad deportiva</option>
      </select>
    </div>
    <button onclick="clearFunFilter()" style="font-size:11px;padding:3px 8px;border-radius:var(--br);border:0.5px solid var(--bo2);background:none;cursor:pointer;font-family:inherit">✕ Limpiar</button>
  </div>

  <div id="week-nav-wrap">
  <div class="week-nav">
    <button class="week-nav-btn" onclick="navWeek(-1)"><i class="ti ti-chevron-left"></i></button>
    <span class="week-label" id="week-label"></span>
    <button class="week-today" onclick="goToday()">Hoy</button>
    <button class="week-nav-btn" onclick="navWeek(1)"><i class="ti ti-chevron-right"></i></button>
  </div>
  <div class="week-strip" id="week-strip"></div>
  </div>

  <div class="content" id="main-content"></div>
<div id="libro-content" style="display:none;padding:16px;max-width:600px;margin:0 auto">
  <!-- Cliente selector -->
  <div style="margin-bottom:16px">
    <label style="font-size:12px;color:var(--tx2);margin-bottom:6px;display:block;font-weight:600;text-transform:uppercase;letter-spacing:.3px">Cliente</label>
    <select id="lc-sel-cli" onchange="renderLibroCampo()" style="width:100%;font-size:15px;padding:12px 14px;border:0.5px solid var(--bo2);border-radius:var(--br);background:var(--bg2);color:var(--tx);font-family:inherit">
      <option value="">Seleccionar cliente...</option>
    </select>
  </div>
  <!-- Canchas grid -->
  <div id="lc-canchas"></div>
</div>
</div>

<script>
// ── DATA ──────────────────────────────────────────────────────
var clientes=[], funcionarios=[], tasks=[], recs=[], checklists={}, maquinas=[], novs=[], acts=[];
var nxNov=1;
const SB_URL='https://kkuhghsmoxlcuhhpzkll.supabase.co';
const SB_KEY='sb_publishable_DW9Wvf4kOHMOBo-aA-W3tw_jjafLqPA';
var sbOnline=true;

async function sbGet(table,params){
  var r=await fetch(SB_URL+'/rest/v1/'+table+'?'+(params||'select=*'),{headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}});
  if(!r.ok)throw new Error(await r.text());
  return r.json();
}
async function sbUpsert(table,body){
  var bodyArr=Array.isArray(body)?body:[body];
  var r=await fetch(SB_URL+'/rest/v1/'+table,{method:'POST',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'resolution=merge-duplicates,return=representation'},body:JSON.stringify(body)});
  if(!r.ok)throw new Error(await r.text());
  var result=await r.json();
  var resultArr=Array.isArray(result)?result:[result];
  // CRITICAL: verify the same number of rows came back
  if(resultArr.length!==bodyArr.length){
    throw new Error('sbUpsert mismatch on '+table+': sent '+bodyArr.length+', got back '+resultArr.length);
  }
  return result;
}
var openCards={};

// ── STATE ─────────────────────────────────────────────────────
var cFun=null;
var cView='dia';  // 'dia' | 'semana'
var cMon=monday(new Date());
var cDay=fD(new Date());

// ── UTILS ─────────────────────────────────────────────────────
function fD(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function aD(d,n){var r=new Date(d);r.setDate(r.getDate()+n);return r;}
function monday(d){var r=new Date(d);var day=r.getDay();var diff=day===0?-6:1-day;r.setDate(r.getDate()+diff);r.setHours(0,0,0,0);return r;}
function tFuns(t){return Array.isArray(t.funs)?t.funs:(t.fun?[t.fun]:[]);}
function toggleAsignar(taskId,funNombre){
  var t=tasks.find(function(x){return x.id===taskId;});
  if(!t)return;
  if(!Array.isArray(t.funs))t.funs=t.funs?[t.funs]:[];
  var idx=t.funs.indexOf(funNombre);
  if(idx>=0){
    t.funs.splice(idx,1); // unassign
  } else {
    t.funs.push(funNombre); // assign
  }
  t._dirty=true;
  saveSingleTask(t).catch(function(e){console.warn('asignar save error',e);queueTaskSync(t,t.est);});
  render();
}

function taskForFun(t,funName){
  var fo=funcionarios.find(function(f){return f.nombre===funName;});
  var funs=tFuns(t);
  // Encargado sees ALL tasks of their clients, OR tasks assigned to them directly
  if(fo&&fo.encargado&&fo.clientes){
    if(t.cli&&fo.clientes.indexOf(t.cli)>=0)return true; // task of their client
    if(funs.indexOf(funName)>=0)return true; // assigned to encargado directly
    // Task assigned to one of their operative funcionarios (e.g. machine task with no client)
    if(funs.length){
      var anyOfTeam=funs.some(function(fn){
        var opf=funcionarios.find(function(f){return f.nombre===fn;});
        if(!opf||!opf.clientes)return false;
        return opf.clientes.some(function(c){return fo.clientes.indexOf(c)>=0;});
      });
      if(anyOfTeam)return true;
    }
    return false;
  }
  // Regular funcionario: assigned to them, OR unassigned and works for that client
  if(funs.length)return funs.indexOf(funName)>=0;
  if(!fo||!fo.clientes)return false;
  return fo.clientes.indexOf(t.cli)>=0;
}

function loadCampoCache(){

    if(!raw)return false;
    var s=JSON.parse(raw);
    if(s.v&&(Date.now()-s.v)>5*60*1000)return false;
    clientes=s.clientes||[];
    funcionarios=s.funcionarios||[];
    maquinas=s.maquinas||[];
    tasks=s.tasks||[];
    recs=s.recs||[];
    checklists=s.checklists||{};
    return true;
  }catch(e){return false;}
}
function saveCampoCache(){
  try{localStorage.setItem('campo_cache',JSON.stringify({clientes:clientes,funcionarios:funcionarios,maquinas:maquinas,tasks:tasks,recs:recs,checklists:checklists,savedAt:new Date().toISOString(),v:Date.now()}));}
  catch(e){}}
async function loadData(){
  try{
    var[cliRows,funRows,maqRows,tarRows,recRows,cfgRows]=await Promise.all([

    tasks=tarRows.map(function(t){return{id:t.id,cli:t.cli,can:t.can,tar:t.tar,funs:t.funs||[],maq:t.maq||'',maq2:t.maq2||'',fec:t.fec,des:t.des,has:t.has,spc:t.spc||'',est:t.est,obs:t.obs||'',recId:t.rec_id,chk:t.chk||{},hsIni:t.hs_ini,hsFin:t.hs_fin,tsIni:t.ts_ini,compPor:t.comp_por||null};});
    var actRows=await sbGet('actividades','select=*&order=fec,des');
    acts=actRows.map(function(a){return{id:a.id,cli:a.cli||null,fec:a.fec,can:a.can,des:a.des,has:a.has,tipo:a.tipo,detalle:a.detalle};});
    await loadLibroCampo();

    recs=recRows.map(function(r){return{id:r.id,cli:r.cli,can:r.can,tar:r.tar,funs:r.funs||[],maq:r.maq||'',des:r.des,has:r.has,spc:r.spc||'',dias:r.dias||[],hasta:r.hasta,skip:r.skip||[]};});
    cfgRows.forEach(function(c){if(c.clave==='checklists')checklists=c.valor;});
    if(tasks.length)nxNov=Math.max.apply(null,tasks.map(function(x){return x.id;}))+1;
    sbOnline=true;
    return true;
  }catch(e){
    sbOnline=false;
    showMsg('Sin conexión a internet. La app requiere conexión para funcionar.');
    return false;
  }
}

async function initLogin(){
  // Try to restore session from localStorage
  var saved=localStorage.getItem('campo_session');
  if(saved){
    var sess=JSON.parse(saved);
    // Load data then restore session
    if(await loadData()){
      var f=funcionarios.find(function(x){return x.nombre===sess.nombre;});
      if(f){enterApp(f.nombre);return;}
    }
  }
  // No session — show login form and pre-load data in background
  loadData().catch(function(){});
}

async function doLogin(){
  var input=document.getElementById('login-input').value.trim().toLowerCase().replace(/\s+/g,'');
  var errEl=document.getElementById('no-funs');
  if(!input){errEl.textContent='Ingresá tu usuario';errEl.style.display='block';return;}
  errEl.style.display='none';
  // Load data if not loaded yet
  if(!funcionarios.length){
    var ok=await loadData();
    if(!ok){errEl.textContent='Sin conexion. Intentalo de nuevo.';errEl.style.display='block';return;}
  }
  // Find by username or first name
  if(input==='admin'){enterApp('admin');return;}
  if(input==='admin'){enterApp('admin');return;}
  var f=funcionarios.find(function(x){
    var uname=(x.username||x.nombre.split(' ')[0]).toLowerCase().replace(/\s+/g,'');
    return uname===input;
  });
  if(!f){errEl.textContent='Usuario no encontrado. Verificá con el admin.';errEl.style.display='block';return;}
  // Check password if set
  var passEl=document.getElementById('login-pass');
  var pass=passEl?passEl.value:'';
  if(f.password&&f.password!==''&&pass!==f.password){
    errEl.textContent='Contraseña incorrecta.';errEl.style.display='block';return;
  }
  enterApp(f.nombre);
}

// ── WEEK STRIP ───────────────────────────────────────────────
function renderWeekStrip(){
  var today=fD(new Date());
  var strip=document.getElementById('week-strip');
  var h='';
  for(var i=0;i<7;i++){
    var d=aD(cMon,i);
    var ds=fD(d);

    h+='<div class="week-day'+(isToday?' today':'')+(isActive?' active':'')+'" onclick="selectDay(\''+ds+'\')">';

    h+='<div class="wd-dot'+(hasTasks?' vis':'')+'"></div>';
    h+='</div>';
  }
  strip.innerHTML=h;
  // Week label
  var end=aD(cMon,6);
  var label=cMon.getDate()+' '+MES[cMon.getMonth()];
  if(cMon.getMonth()!==end.getMonth())label+=' – '+end.getDate()+' '+MES[end.getMonth()];
  else label+=' – '+end.getDate();
  label+=' '+cMon.getFullYear();
  document.getElementById('week-label').textContent=label;

function populateAdminFilters(){
  var funDrop=document.getElementById('af-fun-drop');

  var funChecked=getMSelValsC('af-fun-drop');

  funcionarios.forEach(function(f){
    var lbl=document.createElement('label');lbl.className='msel-item';
    lbl.innerHTML='<input type="checkbox" value="'+f.nombre+'"'+(funChecked.indexOf(f.nombre)>=0?' checked':'')+' onchange="applyMSelC()"> '+f.nombre;
    funDrop.appendChild(lbl);
  });
  cliDrop.innerHTML='';
  clientes.forEach(function(c){
    var lbl=document.createElement('label');lbl.className='msel-item';
    lbl.innerHTML='<input type="checkbox" value="'+c.id+'"'+(cliChecked.indexOf(String(c.id))>=0?' checked':'')+' onchange="applyMSelC()"> '+c.nombre;
    cliDrop.appendChild(lbl);
  });
  // Populate cancha filter — depends on selected cliente(s)
  var afCan=document.getElementById('af-can');
  if(afCan){
    var prevCan=afCan.value;
    var cliValsForCan=getMSelValsC('af-cli-drop');
    var targetClientes=cliValsForCan.length
      ?clientes.filter(function(c){return cliValsForCan.indexOf(String(c.id))>=0;})
      :clientes;
    var canchasSet={};
    targetClientes.forEach(function(c){
      if(c.canchas)c.canchas.forEach(function(ca){
        var nm=typeof ca==='object'?ca.nombre:ca;
        if(nm)canchasSet[nm]=true;
      });
    });
    afCan.innerHTML='<option value="">Todas</option>';
    Object.keys(canchasSet).sort().forEach(function(cn){
      var o=document.createElement('option');
      o.value=cn;o.textContent=cn;
      if(prevCan===cn)o.selected=true;
      afCan.appendChild(o);
    });
  }
}
function getAdminTasks(date){
  var funVals=getMSelValsC('af-fun-drop');
  var cliVals=getMSelValsC('af-cli-drop');
  var estVals=getMSelValsC('af-est-drop');
  if(funVals.length)document.getElementById('af-fun-lbl').textContent=funVals.length+' selec.';
  if(cliVals.length)document.getElementById('af-cli-lbl').textContent=cliVals.length+' selec.';
  if(estVals.length)document.getElementById('af-est-lbl').textContent=estVals.length+' selec.';
  var afCan=document.getElementById('af-can');var canVal=afCan?afCan.value:'';
  var afTipo=document.getElementById('af-tipo');var tipoVal=afTipo?afTipo.value:'';
  if(tipoVal==='actividad')return[]; // actividades handled separately
  return tasks.filter(function(t){
    if(t.est==='cancelada')return false;
    if(date&&t.fec!==date)return false;
    if(funVals.length&&!funVals.some(function(f){return tFuns(t).indexOf(f)>=0;}))return false;
    if(cliVals.length&&cliVals.indexOf(String(t.cli))<0)return false;
    if(estVals.length&&estVals.indexOf(t.est)<0)return false;
    if(canVal&&t.can!==canVal)return false;
    if(tipoVal==='canchas'&&t.tar==='Mant. Maquinaria')return false;
    if(tipoVal==='maquinaria'&&t.tar!=='Mant. Maquinaria')return false;
    return true;
  });
}

function renderDia(){

  var dayLabel=DISF[d.getDay()]+', '+d.getDate()+' de '+MES[d.getMonth()];

  var tipoSelCheck=document.getElementById(isAdmin?'af-tipo':'ffb-tipo');
  var tipoValCheck=tipoSelCheck?tipoSelCheck.value:'';
  var actsForDay=acts.filter(function(a){return a.fec===cDay;});
  var showActs=tipoValCheck!=='canchas'&&tipoValCheck!=='maquinaria'&&actsForDay.length>0;
  if(!myTasks.length&&!showActs){
    el.innerHTML='<div style="font-size:13px;font-weight:600;color:var(--tx2);margin-bottom:16px">'+dayLabel+'</div>'
      +'<div class="empty"><i class="ti ti-calendar-check"></i>'+(isToday?'No tenés tareas para hoy':'Sin tareas este día')+'</div>';

  }

  var h='<div style="font-size:13px;font-weight:600;color:var(--tx2);margin-bottom:16px">'+dayLabel+'</div>';
  // Filter actividades by funcionario's clients AND cancha filter
  var funCliIds=[];
  if(isAdmin){
    // Gather clients from ALL selected funcionarios; if none selected, no restriction
    var selFuns=getMSelValsC('af-fun-drop');
    if(selFuns.length){
      selFuns.forEach(function(fn){
        var fo=funcionarios.find(function(f){return f.nombre===fn;});
        if(fo&&fo.clientes)fo.clientes.forEach(function(cid){if(funCliIds.indexOf(cid)<0)funCliIds.push(cid);});
      });
    }
    // Also respect selected clients filter
    var selClis=getMSelValsC('af-cli-drop');
    if(selClis.length){
      var cliInts=selClis.map(function(x){return parseInt(x);});
      if(funCliIds.length){funCliIds=funCliIds.filter(function(c){return cliInts.indexOf(c)>=0;});}
      else{funCliIds=cliInts;}
    }
  } else {
    var funObj2=funcionarios.find(function(f){return f.nombre===cFun;});
    funCliIds=funObj2&&funObj2.clientes?funObj2.clientes:[];
  }
  var ffbTipoSel=document.getElementById(isAdmin?'af-tipo':'ffb-tipo');
  var ffbTipoVal=ffbTipoSel?ffbTipoSel.value:'';
  var dayActs=(ffbTipoVal==='canchas'||ffbTipoVal==='maquinaria')?[]:acts.filter(function(a){
    if(a.fec!==cDay)return false;
    if(funCliIds.length&&a.cli&&funCliIds.indexOf(a.cli)<0)return false;
    if(_ffbCan&&a.can!==_ffbCan)return false;
    return true;
  });
  // Merge tasks and actividades, sort chronologically
  var allItems=[];
  myTasks.forEach(function(t){allItems.push({type:'task',des:t.des,data:t});});
  dayActs.forEach(function(a){allItems.push({type:'act',des:a.des.substring(0,5),data:a});});
  allItems.sort(function(a,b){return a.des.localeCompare(b.des);});
  allItems.forEach(function(item){
    if(item.type==='task'){
      h+=renderTaskCard(item.data);
    } else {
      var a=item.data;
      var actBg={practica:'#3B6D11',partido:'#A32D2D',amistoso:'#7A5C00'};
      var bg2=actBg[a.tipo]||'#555';
      h+='<div style="background:'+bg2+';color:#fff;border-radius:12px;padding:12px 16px;margin-bottom:8px">';
      h+='<div style="font-weight:600;font-size:13px">⚽ '+a.can+' — '+a.detalle+'</div>';
      h+='<div style="font-size:12px;margin-top:4px;opacity:.85">'+a.des.substring(0,5)+' – '+a.has.substring(0,5)+'</div>';
      h+='</div>';
    }
  });
  el.innerHTML=h;
}

// ── SEMANA VIEW — calendar grid ─────────────────────────────
function renderSemana(){
  var today=fD(new Date());
  var el=document.getElementById('main-content');
  var weekTasks=[];
  for(var i=0;i<7;i++){
    var ds2=fD(aD(cMon,i));
    var dTasks=isAdmin?getAdminTasks(ds2):getFunFilteredTasks(tasks.filter(function(t){return t.fec===ds2&&taskForFun(t,cFun)&&t.est!=='cancelada';}));
    dTasks.forEach(function(t){weekTasks.push(t);});
  }
  // Check if there are actividades to show even without tasks
  var afTipoSemana=document.getElementById(isAdmin?'af-tipo':'ffb-tipo');
  var tipoValSemana=afTipoSemana?afTipoSemana.value:'';
  var hasActsSemana=tipoValSemana!=='canchas'&&tipoValSemana!=='maquinaria'&&acts.length>0;
  if(!weekTasks.length&&!hasActsSemana){
    el.innerHTML='<div class="empty"><i class="ti ti-calendar"></i>Sin tareas esta semana</div>';
    return;
  }
  var minH=7,maxH=18;
  weekTasks.forEach(function(t){
    var h1=parseInt(t.des.split(':')[0]);
    var h2=parseInt((t.has||t.des).split(':')[0]);
    if(h1<minH)minH=h1;
    if(h2+1>maxH)maxH=h2+1;
  });
  // Also include actividades hours in range
  if(tipoValSemana!=='canchas'&&tipoValSemana!=='maquinaria'){
    acts.forEach(function(a){
      var ah=parseInt(a.des.substring(0,2));
      if(ah<minH)minH=ah;
      if(ah+2>maxH)maxH=ah+2;
    });
  }
  minH=Math.max(0,minH-1);

      cell.innerHTML='<div style="font-size:9px;text-transform:uppercase;color:'+(isToday?'var(--blue)':'var(--tx3)')+';letter-spacing:.3px">'+DIS[d.getDay()]+'</div>'
        +'<div style="font-size:15px;font-weight:'+(hasTasks?'700':'400')+';color:'+(isToday?'var(--blue)':'var(--tx)')+'">'+d.getDate()+'</div>';
      cell.onclick=function(){selectDayFromSemana(ds);};
      grid.appendChild(cell);
    })(i);
  }

  // Time rows
  hours.forEach(function(hh){
    var tlCell=document.createElement('div');
    tlCell.style.cssText='font-size:9px;color:var(--tx3);padding:4px 4px 0 0;text-align:right;border-right:0.5px solid var(--bo);border-bottom:0.5px solid var(--bo);background:var(--bg);min-height:44px';
    tlCell.textContent=String(hh).padStart(2,'0');
    grid.appendChild(tlCell);

    for(var i=0;i<7;i++){
      (function(i,hh){
        var d=aD(cMon,i);
        var ds=fD(d);
        var isToday=ds===today;
        var cellTasks=isAdmin
          ?getAdminTasks(ds).filter(function(t){return parseInt(t.des.split(':')[0])===hh;})

        var cellActs=(tipoFilterVal==='canchas'||tipoFilterVal==='maquinaria')?[]:acts.filter(function(a){

          if(weekCliIds.length&&a.cli&&weekCliIds.indexOf(a.cli)<0)return false;

  return '<div class="tcard" id="tcard-'+t.id+'">'
    +'<div class="thead" onclick="toggleCard('+t.id+')">'
    +'<div class="tbar" style="background:'+bg+'"></div>'

async function saveSingleTask(t){
  var row={id:t.id,cli:t.cli,can:t.can,tar:t.tar,funs:t.funs||[],
    maq:t.maq||'',maq2:t.maq2||'',fec:t.fec,des:t.des,has:t.has,
    spc:t.spc||'',est:t.est,obs:t.obs||'',rec_id:t.recId||null,
    chk:t.chk||{},hs_ini:t.hsIni||null,hs_fin:t.hsFin||null,ts_ini:t.tsIni||null,comp_por:t.compPor||null};
  await sbUpsert('tareas',[row]);
}
async function verifyTaskSaved(taskId, expectedEst){
  try{
    var rows=await sbGet('tareas','select=id,est&id=eq.'+taskId);
    if(!rows||!rows.length)return false;
    return rows[0].est===expectedEst;
  }catch(e){
    return false;
  }
}
// Background sync queue — retries silently, no user action needed
var _syncQueue={}; // taskId -> {task, attempts, est}
var _syncQueueTimer=null;

function queueTaskSync(t, expectedEst){
  _syncQueue[t.id]={task:t, attempts:0, est:expectedEst, startedAt:Date.now()};
  processSyncQueue();
}

async function processSyncQueue(){
  var ids=Object.keys(_syncQueue);
  if(!ids.length)return;
  for(var idx=0;idx<ids.length;idx++){
    var id=ids[idx];
    var entry=_syncQueue[id];
    if(!entry)continue;
    try{
      await saveSingleTask(entry.task);
      var ok=await verifyTaskSaved(entry.task.id, entry.est);
      if(ok){
        delete _syncQueue[id];
        // Background full sync (machines, novedades) — fire and forget
        saveBack().catch(function(){});
      } else {
        entry.attempts++;
      }
    }catch(e){
      entry.attempts++;
    }
  }
  updateSyncIndicator();
  // Keep retrying every 4 seconds while there's anything pending
  if(Object.keys(_syncQueue).length){
    if(_syncQueueTimer)clearTimeout(_syncQueueTimer);
    _syncQueueTimer=setTimeout(processSyncQueue,4000);
  }
}

function updateSyncIndicator(){
  var ids=Object.keys(_syncQueue);
  var el=document.getElementById('sync-error-banner');
  if(!el)return;
  if(!ids.length){
    el.style.display='none';
    return;
  }
  // Only show the banner if something has been pending for more than 15 seconds
  var oldEnough=ids.some(function(id){return Date.now()-_syncQueue[id].startedAt>15000;});
  if(oldEnough){
    var msg=ids.length===1
      ? 'Sincronizando 1 cambio pendiente...'
      : 'Sincronizando '+ids.length+' cambios pendientes...';
    document.getElementById('sync-error-msg').textContent=msg;
    el.style.display='block';
  } else {
    el.style.display='none';
  }
}

function dismissSyncBanner(){
  document.getElementById('sync-error-banner').style.display='none';
}
function retrySyncErrors(){
  processSyncQueue();
}
async function saveBackVerified(taskId, expectedEst, maxTries){
  maxTries=maxTries||5;
  var t=tasks.find(function(x){return x.id===taskId;});
  if(!t)return false;
  for(var i=0;i<maxTries;i++){
    try{
      // Save THIS task directly and atomically — not the whole array
      await saveSingleTask(t);
      var verified=await verifyTaskSaved(taskId, expectedEst);
      if(verified){
        // Task confirmed — now sync the rest (maquinas, novedades) in background, non-blocking
        saveBack().catch(function(e){console.warn('background full sync error',e);});
        return true;
      }
      console.warn('Verificacion fallo, intento '+(i+1)+'/'+maxTries);
    }catch(e){
      console.warn('saveSingleTask fallo, intento '+(i+1)+'/'+maxTries, e);
    }
    await new Promise(function(res){setTimeout(res, 1200*(i+1));});
  }
  return false;
}

function toggleMaqCheck(taskId, item){
  var t=tasks.find(function(x){return x.id===taskId;});if(!t)return;
  t.chk=t.chk||{};
  t.chk[item]=!t.chk[item];
  openCards[t.id]=true;

}

var _ffbCli='', _ffbCan='';

function initFunFilterBar(){
  var bar=document.getElementById('fun-filter-bar');
  if(!bar||isAdmin)return;
  var funObj=funcionarios.find(function(f){return f.nombre===cFun;});
  if(!funObj)return;
  var funClis=funObj.clientes||[];
  if(!funClis.length){bar.style.display='none';return;}
  var cliWrap=document.getElementById('ffb-cli-wrap');
  var cliSel=document.getElementById('ffb-cli');
  // Show client filter only if funcionario has more than 1 client
  if(funClis.length>1){
    cliWrap.style.display='flex';
    cliSel.innerHTML='<option value="">Todos</option>';
    funClis.forEach(function(cid){
      var c=clientes.find(function(x){return x.id===cid;});
      if(c){var o=document.createElement('option');o.value=cid;o.textContent=c.nombre;if(_ffbCli==cid)o.selected=true;cliSel.appendChild(o);}
    });
  } else {
    cliWrap.style.display='none';
    _ffbCli=String(funClis[0]);
  }
  // Populate cancha filter
  updateFunFilterCanchas();
  bar.style.display='flex';
}

function updateFunFilterCanchas(){
  var canSel=document.getElementById('ffb-can');if(!canSel)return;
  var funObj=funcionarios.find(function(f){return f.nombre===cFun;});
  if(!funObj)return;
  var funClis=_ffbCli?[parseInt(_ffbCli)]:(funObj.clientes||[]);
  var canchas=[];
  funClis.forEach(function(cid){
    var c=clientes.find(function(x){return x.id===cid;});
    if(c&&c.canchas)c.canchas.forEach(function(cn){
      var cnNombre=typeof cn==='object'?cn.nombre:cn;
      if(cnNombre&&canchas.indexOf(cnNombre)<0)canchas.push(cnNombre);
    });
  });
  canchas.sort();
  canSel.innerHTML='<option value="">Todas</option>';
  canchas.forEach(function(cn){
    var o=document.createElement('option');
    o.value=cn;o.textContent=cn;
    if(_ffbCan===cn)o.selected=true;
    canSel.appendChild(o);
  });
}

function onFunFilterCli(){
  var cliSel=document.getElementById('ffb-cli');
  _ffbCli=cliSel?cliSel.value:'';
  _ffbCan='';
  updateFunFilterCanchas();
  render();
}

function clearFunFilter(){
  _ffbCli='';_ffbCan='';
  var cliSel=document.getElementById('ffb-cli');
  var canSel=document.getElementById('ffb-can');
  if(cliSel)cliSel.value='';
  if(canSel)canSel.value='';
  render();
}

function getFunFilteredTasks(taskList){
  if(isAdmin)return taskList;
  var canSel=document.getElementById('ffb-can');
  _ffbCan=canSel?canSel.value:'';
  var tipoSel=document.getElementById('ffb-tipo');
  var tipoVal=tipoSel?tipoSel.value:'';
  if(tipoVal==='actividad')return[];
  return taskList.filter(function(t){
    // Machine tasks with no client shouldn't be filtered out by client filter
    if(_ffbCli&&t.cli!==parseInt(_ffbCli)&&!(t.tar==='Mant. Maquinaria'&&!t.cli))return false;
    if(_ffbCan&&t.can&&t.can!==_ffbCan)return false;
    if(tipoVal==='canchas'&&t.tar==='Mant. Maquinaria')return false;
    if(tipoVal==='maquinaria'&&t.tar!=='Mant. Maquinaria')return false;
    return true;
  });
}

function hDiff(des,has){var h1=parseInt(des.split(':')[0]),m1=parseInt(des.split(':')[1]||0);var h2=parseInt(has.split(':')[0]),m2=parseInt(has.split(':')[1]||0);return Math.max(0,((h2*60+m2)-(h1*60+m1))/60);}

function completar(id){
  var t=tasks.find(function(x){return x.id===id;});if(!t)return;
  var obsEl=document.getElementById('obs-'+id);
  if(obsEl)t.obs=obsEl.value||'';
  var hsfEl=document.getElementById('hsf-'+id);
  // Calculate real elapsed hours from clock
  var realHs=null;
  if(t.tsIni){
    var elapsed=(Date.now()-t.tsIni)/3600000; // ms to hours
    if(elapsed>0&&elapsed<24)realHs=parseFloat(elapsed.toFixed(2));
  }
  // Update maquina hours
  if(t.maq){
    var maqObj=maquinas.find(function(m){return m.nombre===t.maq;});
    if(maqObj){
      maqObj.hist=maqObj.hist||[];
      var hsIni=t.hsIni!==null&&t.hsIni!==undefined?t.hsIni:(+maqObj.hs||0);
      var hsfManual=hsfEl?parseFloat(hsfEl.value):NaN;
      var ah=realHs!==null?realHs:hDiff(t.des,t.has);
      if(!isNaN(hsfManual)&&hsfManual>=hsIni){
        // Manual override
        t.hsFin=hsfManual; maqObj.hs=hsfManual;
        maqObj.hist.push({fec:fD(new Date()),hs:hsfManual,tar:t.tar,can:t.can,cliId:t.cli,desc:'',tipo:'uso',diff:parseFloat((hsfManual-hsIni).toFixed(2)),funs:tFuns(t)});
      } else {
        t.hsFin=parseFloat(((+maqObj.hs||0)+ah).toFixed(2));
        maqObj.hs=t.hsFin;
        maqObj.hist.push({fec:fD(new Date()),hs:t.hsFin,tar:t.tar,can:t.can,cliId:t.cli,desc:'('+ah.toFixed(2)+'hs reales)',tipo:'uso',diff:parseFloat(ah.toFixed(2)),funs:tFuns(t)});
      }
    }
  }
  t.est='completada';
  // Register who completed (the logged-in user pressing the button)
  t.compPor=isAdmin?'Admin':cFun;
  // Add novedad
  var mainFun=t.compPor;
  var novTxt=t.obs?(t.tar+' - '+t.can+': "'+t.obs+'"'):(t.tar+' - '+t.can+' completado');
  if(!novs)novs=[];
  novs.unshift({id:Date.now(),tipo:t.obs?'anomalia':'ok',fun:mainFun,txt:novTxt,fec:fD(new Date()),leida:false});
  openCards[id]=false;
  // Optimistic UI: show success immediately, sync happens in background
  showSaveStatus('✓ Completada',true);
  setTimeout(hideSaveStatus,3000);
  render();
  queueTaskSync(t,'completada');
}

// ── SAVE BACK TO MAIN APP ────────────────────────────────────
async function saveBack(){
  // saveBack only syncs machines and novedades
  // Tasks are saved individually via saveSingleTask() to avoid overwriting
  // states set by other users or the web app
  if(!sbOnline){return;}
  try{
    var maqToSync=maquinas.map(function(m){
      return{id:m.id,nombre:m.nombre,tipo:m.tipo,marca:m.marca||'',
        cat:m.cat||'general',scope:m.scope,cli_id:m.cliId||null,
        hs:m.hs,intervalo:m.intervalo,proximo:m.proximo,
        tareas:m.tareas,svc_tareas:m.svcTareas||[],hist:m.hist||[]};
    });
    var novToSync=novs.map(function(n){
      return{id:n.id,tipo:n.tipo,fun:n.fun,txt:n.txt,fec:n.fec,leida:n.leida};
    });
    await Promise.all([
      maqToSync.length?sbUpsert('maquinas',maqToSync):Promise.resolve(),
      novToSync.length?sbUpsert('novedades',novToSync):Promise.resolve()
    ]);
    sbOnline=true;
  }catch(e){
    console.warn('saveBack error',e);
    throw e;
  }
}

// ── TOUCH DRAG ENGINE ──────────────────────────────────────
var _tdId=null,_tdClone=null,_tdOX=0,_tdOY=0,_tdTimer=null,_tdActive=false,_tdStartX=0,_tdStartY=0;
function touchDragStart(e,tid){
  var touch=e.touches[0];
  _tdStartX=touch.clientX;
  _tdStartY=touch.clientY;
  _tdActive=false;
  _tdId=tid;
  var chip=e.currentTarget;
  // Start 1 second timer
  _tdTimer=setTimeout(function(){
    // Only activate if finger hasn't moved more than 10px
    _tdActive=true;
    _tdClone=chip.cloneNode(true);
    var r=chip.getBoundingClientRect();
    _tdOX=touch.clientX-r.left;
    _tdOY=touch.clientY-r.top;
    _tdClone.style.cssText='position:fixed;left:'+(touch.clientX-_tdOX)+'px;top:'+(touch.clientY-_tdOY)+'px;width:'+r.width+'px;opacity:.85;pointer-events:none;z-index:9999;border-radius:4px;box-shadow:0 4px 16px rgba(0,0,0,.25)';
    document.body.appendChild(_tdClone);
    chip.style.opacity='.3';
    // Haptic feedback if available
    if(navigator.vibrate)navigator.vibrate(50);
  },1000);
  // Don't preventDefault yet — allow scroll to work normally
}
function touchDragMove(e){
  var touch=e.touches[0];
  var dx=touch.clientX-_tdStartX;
  var dy=touch.clientY-_tdStartY;
  // If finger moved more than 10px before 1s timer, cancel drag (user is scrolling)
  if(!_tdActive&&(Math.abs(dx)>10||Math.abs(dy)>10)){
    if(_tdTimer){clearTimeout(_tdTimer);_tdTimer=null;}
    _tdId=null;
    return;
  }
  if(!_tdActive||!_tdClone)return;
  _tdClone.style.left=(touch.clientX-_tdOX)+'px';
  _tdClone.style.top=(touch.clientY-_tdOY)+'px';
  _tdClone.style.display='none';
  var el=document.elementFromPoint(touch.clientX,touch.clientY);
  _tdClone.style.display='';
  document.querySelectorAll('.drop-cell').forEach(function(c){c.style.background='';});
  var cell=el?el.closest('.drop-cell'):null;
  if(cell)cell.style.background='#ddeeff';
  e.preventDefault();
}
function touchDragEnd(e){
  if(_tdTimer){clearTimeout(_tdTimer);_tdTimer=null;}
  if(!_tdId||!_tdActive){_tdId=null;_tdActive=false;return;}
  var touch=e.changedTouches[0];
  if(_tdClone){_tdClone.remove();_tdClone=null;}
  // Reset chip opacity
  document.querySelectorAll('[data-tid]').forEach(function(c){c.style.opacity=''});
  document.querySelectorAll('.drop-cell').forEach(function(c){c.style.background='';});
  // Find cell under finger
  var el=document.elementFromPoint(touch.clientX,touch.clientY);
  var cell=el?el.closest('.drop-cell'):null;
  if(cell){
    var dropDs=cell.dataset.dropDs;
    var dropHh=parseInt(cell.dataset.dropHh);
    var t=tasks.find(function(x){return x.id===_tdId;});if(t){
      var dur=hDiff(t.des,t.has);
      t.fec=dropDs;
      t.des=String(dropHh).padStart(2,'0')+':00';
      t.has=String(Math.min(23,dropHh+Math.max(1,Math.round(dur)))).padStart(2,'0')+':00';
      saveBack().catch(function(e){console.warn('drag save',e);}); render();
    }
  }
  _tdId=null;
  _tdActive=false;
}

<div id="mlc-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-end;justify-content:center">
  <div style="background:var(--bg);border-radius:16px 16px 0 0;padding:20px 20px 32px;width:100%;max-width:500px">
    <div style="font-size:15px;font-weight:700;margin-bottom:4px" id="mlc-title"></div>
    <div style="font-size:12px;color:var(--tx3);margin-bottom:14px" id="mlc-hist-preview"></div>
    <textarea id="mlc-textarea" rows="5" placeholder="Escribí tus observaciones..." style="width:100%;font-size:14px;padding:10px;border:0.5px solid var(--bo2);border-radius:var(--br);background:var(--bg2);color:var(--tx);font-family:inherit;resize:none;margin-bottom:12px"></textarea>
    <div style="display:flex;gap:10px">
      <button onclick="CM3campo('mlc-modal')" style="flex:1;padding:13px;border-radius:var(--br);border:0.5px solid var(--bo2);background:none;font-size:14px;cursor:pointer;font-family:inherit">Cancelar</button>
      <button onclick="saveLibroCampoEntry()" style="flex:2;padding:13px;border-radius:var(--br);border:none;background:var(--blue);color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit">Guardar</button>
    </div>
  </div>
</div>
</body>
</html>
